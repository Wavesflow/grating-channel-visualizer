                      ∩ circle = full <TeX tex={"\\mathbf{k} = (k_x, k_y)"} />
                    </span>
                  </div>
                  <div className="klabel-row">
                    <span className="klabel">
                      <span className="marker" style={{borderColor:'var(--accent)', width:18}}></span>
                      <TeX tex={`|\\mathbf{k}| = n_{\\text{air}}\\,k_0 = ${fmt(params.nAir, 3)}\\,k_0`} />
                    </span>
                    <span className="klabel">
                      <span className="marker" style={{borderColor:'var(--accent-2)', width:18}}></span>
                      <TeX tex={`|\\mathbf{k}| = n_{\\text{sub}}\\,k_0 = ${fmt(params.nGlass, 3)}\\,k_0`} />
                    </span>
                    {(() => {
                      const inputIsTop = derived.sideSign === +1;
                      const upper = inputIsTop ? 'reflected' : 'transmitted';
                      const lower = inputIsTop ? 'transmitted' : 'reflected';
                      const upperC = upper === 'transmitted' ? 'var(--trans)' : 'var(--refl)';
                      const lowerC = lower === 'transmitted' ? 'var(--trans)' : 'var(--refl)';
                      return (
                        <Fragment>
                          <span className="klabel">
                            <span className="text-faint mono text-[11px]">upper</span>
                            <span className="mono text-[11px]" style={{color: upperC}}>{upper}</span>
                          </span>
                          <span className="klabel">
                            <span className="text-faint mono text-[11px]">lower</span>
                            <span className="mono text-[11px]" style={{color: lowerC}}>{lower}</span>
                          </span>
                        </Fragment>
                      );
                    })()}
                    <span className="klabel" style={{background:'transparent'}}>
                      <span className="text-faint mono text-[11px]">order range</span>
                      <TeX tex={`m \\in [${params.mMin}, ${params.mMax}]`} />
                    </span>
                  </div>
                  {(() => {
                    // Compute the auto half-width so the slider can default to it.
                    const maxKx = derived.orders.reduce((a, o) => Math.max(a, Math.abs(o.kxNorm)), 0);
                    const autoHW = Math.max(maxKx * 1.08, nGlass * 1.15);
                    const currentHW = kZoom !== null ? kZoom : autoHW;
                    return (
                      <div className="flex items-center gap-3 mb-3 flex-wrap">
                        <span className="label-cap" style={{textTransform:'uppercase'}}>
                          k-space view
                        </span>
                        <input type="range" min="1.2" max="8" step="0.1"
                          value={currentHW.toFixed(2)}
                          onChange={e => setKZoom(parseFloat(e.target.value))}
                          style={{flex: 1, minWidth: 120, maxWidth: 220}} />
                        <span className="mono text-[12px]">±{currentHW.toFixed(2)} <span className="text-faint">k₀</span></span>
                        <button className="seg" style={{padding:'4px 10px'}}
                          onClick={() => setKZoom(null)}>
                          {kZoom === null ? 'auto' : 'reset to auto'}
                        </button>
                      </div>
                    );
                  })()}
                  <KSpaceView params={params} derived={derived}
                    hoveredM={hoveredM} onHover={setHoveredM}
                    onSelectTarget={(m) => set('mTarget', m)}
                    zoomOverride={kZoom} />
                </div>

                <OrdersTable derived={derived} params={params}
                  hoveredM={hoveredM} onHover={setHoveredM}
                  onSelectTarget={(m) => set('mTarget', m)} />
              </div>

              <div className="col-span-12 xl:col-span-4 space-y-5">
                <Controls params={params} set={set} />
                <KReadout derived={derived} params={params} />
                <FormulasPanel derived={derived} />

                <div className="surface p-5">
                  <div className="text-[11px] mono tracking-[0.18em] text-faint mb-2">KEY IDEA</div>
                  <p className="text-[14.5px] leading-relaxed">
                    <span style={{color:'var(--text)', fontWeight:500}}>Grating equation</span> decides which
                    channels exist. <span style={{color:'var(--text)', fontWeight:500}}>Metasurface design</span>
                    {' '}decides how much power goes into each open channel.
                  </p>
                </div>
              </div>
            </div>

            <footer className="text-faint text-[12px] mt-10 mb-4 flex flex-wrap gap-x-7 gap-y-2 items-center">
              <TeX tex={"k_0 = \\dfrac{2\\pi}{\\lambda}"} />
              <TeX tex={"G = \\dfrac{2\\pi}{\\Lambda}"} />
              <TeX tex={"n_{\\text{in}}\\sin\\theta_i = \\dfrac{k_{x,m}}{k_0} - m\\,\\dfrac{\\lambda}{\\Lambda}"} />
            </footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
